name: pytest
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'core/**.py'
      - 'tests/**.py'
      - '.github/workflows/pytest.yml'
      # 2026-05-07 追加: ダッシュボード関連変更でも自動実行（再発防止メカニズム §7-1）
      - 'generate_dashboard.py'
      - 'ai_dashboard_v13.html'
      - 'weekly_update.py'
      - 'daily_price_update.py'
      - 'manage_stock.py'
      - 'full_scan.py'
  workflow_dispatch:
env:
  TZ: Asia/Tokyo
  PYTHONPATH: ${{ github.workspace }}
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pytest pandas numpy
      - run: pytest tests/ -v
