name: pytest
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'core/**.py'
      - 'tests/**.py'
      - '.github/workflows/pytest.yml'
      # 2026-05-07 追加: ダッシュボード関連変更でも自動実行（再発防止メカニズム §7-1）
      - 'generate_dashboard.py'
      - 'ai_dashboard_v13.html'
      - 'weekly_update.py'
      - 'daily_price_update.py'
      - 'manage_stock.py'
      - 'full_scan.py'
      # 2026-05-08 追加: 取引履歴プログラム v1.2（PROCEDURE_BULK_HOLDINGS_DIFF_PERFECTION）
      - 'bulk_update_holdings.py'
      - 'holdings_history_page.html'
  workflow_dispatch:
env:
  TZ: Asia/Tokyo
  PYTHONPATH: ${{ github.workspace }}
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pytest pandas numpy pyflakes
      # 再発防止: generate_dashboard.py の構文/未定義名(NameError級)を merge 前に機械検知
      # （2026-05-19 _next_verify_str 未定義で日次更新が4日停止した事案の構造的対策）
      # NameError級(undefined name / referenced before assignment)のみで fail。
      # 既存の良性 lint(未使用import・f-string placeholder無)では落とさない。
      - name: static guard - generate_dashboard.py (py_compile + undefined-name)
        run: |
          python -m py_compile generate_dashboard.py
          if python -m pyflakes generate_dashboard.py 2>&1 | grep -iE "undefined name|referenced before assignment"; then
            echo "::error::generate_dashboard.py に未定義名/参照前変数 (NameError級) を検出"
            exit 1
          fi
          echo "static guard OK: NameError級ゼロ"
      - run: pytest tests/ -v
