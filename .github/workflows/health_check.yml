name: Health Check

on:
  schedule:
    # 毎朝 7:45 JST（22:45 UTC前日）
    # 7:00 FRED, 7:30 株価 完了後にチェックする
    - cron: '45 22 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

# health_check.py は GitHub API を叩く:
#   - 各ワークフローの直近 run 取得 → actions: read
#   - system_health.json / .md を Contents API でコミット → contents: write
# permissions ブロック未宣言だとリポジトリ既定の制限トークンとなり
# actions API が 401 で落ちる（2026-05 health_check 6 日連続失敗の真因）。
permissions:
  actions: read
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/health_check.py
