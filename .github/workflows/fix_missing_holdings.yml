name: Fix Missing Holdings

# 保有銘柄_v4.3スコア に存在するが、コアスキャン_v4.3 / 予測記録 に
# 存在しない銘柄を補完する保守用 workflow

on:
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth requests pandas numpy yfinance
      - env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python fix_missing_holdings.py
