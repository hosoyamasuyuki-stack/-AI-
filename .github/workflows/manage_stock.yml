name: Stock Management

on:
  workflow_dispatch:
    inputs:
      code:
        description: '銘柄コード（4桁）'
        required: true
      action:
        description: '操作（add/remove/move）'
        required: true
      target:
        description: '対象（保有/監視）'
        required: true

env:
  TZ: Asia/Tokyo

jobs:
  manage-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: manage-stock
      cancel-in-progress: false

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth yfinance pandas numpy

      - name: 銘柄管理実行
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== 銘柄管理: ${{ github.event.inputs.action }} ${{ github.event.inputs.code }} -> ${{ github.event.inputs.target }} ==="
          python manage_stock.py \
            --code "${{ github.event.inputs.code }}" \
            --action "${{ github.event.inputs.action }}" \
            --target "${{ github.event.inputs.target }}"

      - name: API制限回避（30秒待機）
        run: sleep 30

      - name: ダッシュボードHTML再生成
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== ダッシュボード再生成 ==="
          python generate_dashboard.py

      - name: GitHubにプッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Stock Mgmt]"
          git add ai_dashboard_v13.html
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          MSG="stock: ${{ github.event.inputs.action }} ${{ github.event.inputs.code }} (${{ github.event.inputs.target }})"
          git commit -m "$MSG"
          # 生成物は最新生成が常に正。旧 `git pull --rebase origin main || true`+`git push` は
          # 競合 rebase を握り潰し detached HEAD で push fatal(exit128) を招く構造欠陥。
          # 最新 origin/main に生成物のみ載せ替え＋fast-forward リトライで根治（失敗は明示 exit1）。
          FILES="ai_dashboard_v13.html"
          SRC=$(git rev-parse HEAD)
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            PRESENT=""
            for fn in $FILES; do git cat-file -e "$SRC:$fn" 2>/dev/null && PRESENT="$PRESENT $fn"; done
            git checkout "$SRC" -- $PRESENT
            git add $PRESENT
            if git diff --staged --quiet; then echo "他更新で差分消滅（スキップ）"; exit 0; fi
            git commit -m "$MSG" --quiet
            SRC=$(git rev-parse HEAD)
            if git push origin HEAD:main; then echo "プッシュ完了"; exit 0; fi
            echo "push 競合・リトライ $i/5"
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::push failed after 5 retries"
          exit 1
