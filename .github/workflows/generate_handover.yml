name: Generate Handover

on:
  schedule:
    # 毎週月曜日 8:00 JST (23:00 UTC日曜)
    - cron: '0 23 * * 0'
  workflow_dispatch:
    # 手動実行も可能

env:
  TZ: Asia/Tokyo

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install gspread google-auth requests
      
      - name: Generate and commit handover.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tools/generate_handover.py
