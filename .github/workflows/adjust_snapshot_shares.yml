name: Adjust Snapshot Shares

# 保有スナップショットの「指定月 × 指定コード」の株数セルだけを比率で補正する保守用 workflow。
# 用途: 株式分割で当月株数が増えた銘柄を「増し玉」と誤判定させないため、前月スナップショットを
#       分割後株数に補正する（例: 2026-06-01 の 8053 を 1株→4株分割に合わせ ratio=4 で 400→1600）。
# 安全:
#   - dry_run=true（既定）では対象行の before→after を表示するのみ。書き込みなし。
#   - 触るのは『保有スナップショット』の該当行の『株数』セルだけ。
#     保有差分 / 保有差分_履歴 / 保有ポートフォリオ_master 等 他シートには一切触れない
#     → 公開済みの過去月の取引履歴は壊れない。
#   - compute_diff / append_history は呼ばない（月次処理は回さない）。

on:
  workflow_dispatch:
    inputs:
      sheet:
        description: '対象シート名（既定=保有スナップショット）'
        required: true
        default: '保有スナップショット'
      snapshot_month:
        description: '対象月キー（例 2026-06-01）'
        required: true
      code:
        description: '証券コード（例 8053）'
        required: true
      ratio:
        description: '分割比率（1株→N株のN。1:4分割なら 4、1:10分割なら 10）'
        required: true
      dry_run:
        description: 'true=表示のみ / false=実際に書き換え'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  TZ: Asia/Tokyo

jobs:
  adjust:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: adjust-snapshot-shares
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth
      - name: 株数セル補正
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET: ${{ github.event.inputs.sheet }}
          SNAPSHOT_MONTH: ${{ github.event.inputs.snapshot_month }}
          CODE: ${{ github.event.inputs.code }}
          RATIO: ${{ github.event.inputs.ratio }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python <<'PY'
          import os
          from core.auth import get_spreadsheet

          sheet = os.environ['SHEET'].strip()
          month = os.environ['SNAPSHOT_MONTH'].strip()
          code  = os.environ['CODE'].strip().upper()
          ratio = float(os.environ['RATIO'])
          dry   = os.environ['DRY_RUN'].strip().lower() != 'false'

          ss = get_spreadsheet()
          ws = ss.worksheet(sheet)
          vals = ws.get_all_values()
          if len(vals) < 2:
              print('  シートが空です。中止。'); raise SystemExit(1)
          header = [h.strip() for h in vals[0]]

          def col_of(*names):
              for i, h in enumerate(header):
                  if h in names:
                      return i
              return -1

          m_col = col_of('snapshot_month')
          c_col = col_of('証券コード', 'コード', '銘柄コード')
          s_col = col_of('株数')
          if min(m_col, c_col, s_col) < 0:
              print(f'  必要な列が見つかりません: month={m_col} code={c_col} shares={s_col}')
              print(f'  header={header}'); raise SystemExit(1)

          print(f'=== Adjust Snapshot Shares ({"DRY-RUN" if dry else "LIVE"}) ===')
          print(f'  sheet={sheet}  month={month}  code={code}  ratio=x{ratio}')

          updates = []
          for ridx, row in enumerate(vals[1:], start=2):
              if len(row) <= max(m_col, c_col, s_col):
                  continue
              if row[m_col].strip() != month:
                  continue
              if str(row[c_col]).strip().upper() != code:
                  continue
              old_raw = (row[s_col] or '').strip().replace(',', '')
              try:
                  old = float(old_raw)
              except ValueError:
                  print(f'  行{ridx}: 株数が数値でない({row[s_col]!r}) → スキップ'); continue
              new_i = int(round(old * ratio))
              owner = row[2] if len(row) > 2 else ''
              broker = row[3] if len(row) > 3 else ''
              print(f'  行{ridx}: {code} 株数 {old_raw} -> {new_i} (x{ratio})  [{owner}/{broker}]')
              updates.append((ridx, s_col + 1, new_i))

          if not updates:
              print('  対象行なし（month/code 一致ゼロ）。何も変更していません。'); raise SystemExit(0)

          if dry:
              print(f'  [DRY-RUN] {len(updates)} 行が対象。書き込みはしていません。dry_run=false で本番反映。')
          else:
              for ridx, col1, new_i in updates:
                  ws.update_cell(ridx, col1, new_i)
              print(f'  [LIVE] {len(updates)} 行の株数を更新しました。')
          PY
