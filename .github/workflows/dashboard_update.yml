name: Dashboard Auto Update

on:
  # weekly_update.yml完了後に自動実行
  workflow_run:
    workflows: ["Weekly Update"]
    types:
      - completed

  # 毎週月曜 10:30 JST（01:30 UTC）にも念のため単独実行
  schedule:
    - cron: '30 1 * * 1'

  # 手動実行ボタン（テスト用）
  workflow_dispatch:

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # workflow_runトリガーの場合は成功時のみ実行
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          # pushに必要なトークン
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth yfinance pandas numpy

      - name: ダッシュボードHTMLを生成
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python generate_dashboard.py

      - name: 生成結果を確認
        run: |
          ls -lh ai_dashboard_v13.html
          echo "生成完了"

      - name: 変更をGitHubにコミット＆プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Dashboard Bot]"
          git add ai_dashboard_v13.html
          # 変更がない場合はスキップ
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          git commit -m "🤖 ダッシュボード自動更新 $(date +'%Y/%m/%d %H:%M') JST"
          git push
          echo "✅ GitHubにプッシュ完了"
