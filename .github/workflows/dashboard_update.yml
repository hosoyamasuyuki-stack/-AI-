name: Dashboard Auto Update

on:
  # weekly_update.yml完了後に自動実行
  workflow_run:
    workflows: ["Weekly Update"]
    types:
      - completed

  # X-2 場外化 2026-06-05: 月10:30JST（場中）→ 月07:30JST（寄付前）にも念のため単独実行。
  # UTC日(0)22:30 +9h = 月07:30JST（weekly_update 07:00 の workflow_run 連動が主・本cronは予備）。
  schedule:
    - cron: '30 22 * * 0'

  # 手動実行ボタン（テスト用）
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # workflow_runトリガーの場合は成功時のみ実行
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          # pushに必要なトークン
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth yfinance pandas numpy

      - name: ダッシュボードHTMLを生成
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          python generate_dashboard.py

      - name: 生成結果を確認
        run: |
          ls -lh ai_dashboard_v13.html
          echo "生成完了"

      - name: 変更をGitHubにコミット＆プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Dashboard Bot]"
          git add ai_dashboard_v13.html
          # 変更がない場合はスキップ
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          MSG="dashboard update $(date +'%Y/%m/%d %H:%M') JST"
          git commit -m "$MSG"
          # 生成物は最新生成が常に正。旧 `git pull --rebase origin main || true`+`git push` は
          # 競合 rebase を握り潰し detached HEAD で push fatal(exit128) を招く構造欠陥。
          # 最新 origin/main に生成物のみ載せ替え＋fast-forward リトライで根治（失敗は明示 exit1）。
          FILES="ai_dashboard_v13.html"
          SRC=$(git rev-parse HEAD)
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            PRESENT=""
            for fn in $FILES; do git cat-file -e "$SRC:$fn" 2>/dev/null && PRESENT="$PRESENT $fn"; done
            git checkout "$SRC" -- $PRESENT
            git add $PRESENT
            if git diff --staged --quiet; then echo "他更新で差分消滅（スキップ）"; exit 0; fi
            git commit -m "$MSG" --quiet
            SRC=$(git rev-parse HEAD)
            if git push origin HEAD:main; then echo "✅ GitHubにプッシュ完了"; exit 0; fi
            echo "push 競合・リトライ $i/5"
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::push failed after 5 retries"
          exit 1
