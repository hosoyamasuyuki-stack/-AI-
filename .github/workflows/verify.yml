name: verify

on:
  schedule:
    # X-2 場外化 2026-06-05: 月11:00JST（場中）→ 月16:30JST（大引け後）- verify_monday
    # UTC月07:30 +9h = 月16:30JST（16:30は9時以降ゆえ曜日ずれ無し＝UTCも月曜のまま）。
    - cron: '30 7 * * 1'
    # 2026/04/15 9:00 JST（00:00 UTC） - verify_0415（STEP0目先）
    - cron: '0 0 15 4 *'
    # 毎月1日 10:00 JST（01:00 UTC） - 目先(4週)検証予定日が到来した銘柄を検証
    - cron: '0 1 1 * *'
    # 2027/03/18 9:00 JST（2027/03/18 00:00 UTC） - 短期(1年)検証
    - cron: '0 0 18 3 *'
    # 2029/03/18 9:00 JST - 中期(3年)検証
    # NOTE: GitHub Actions cron は年を指定不可のため毎年3/18に走らせる。
    # verify_axis.py --only_past_due で検証予定日が到来した行のみ処理。
  workflow_dispatch:
    inputs:
      axis:
        description: '検証時間軸（manual実行時のみ）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 目先
          - 短期
          - 中期
          - 長期

env:
  TZ: Asia/Tokyo
  PYTHONPATH: ${{ github.workspace }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth pandas yfinance requests

      - name: Run verify_monday (毎週月曜)
        # 2026-06-06: X-2(6/5)で月曜 cron を '0 2 * * 1'→'30 7 * * 1' に変更したがガード文字列が旧のまま
        # → 月曜 schedule に永久に一致せず verify_monday が起動せず（顧客 framework_page「毎週月曜日に自動実行」が不履行に）。
        # 実 cron(L7)に一致させて週次自動検証を復活。verify_monday.py は健全性チェックの記録のみで顧客データ/スコア不可触。
        if: github.event.schedule == '30 7 * * 1'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python verify/verify_monday.py

      - name: Run verify_axis 目先 (4/15のみ・旧verify_0415互換)
        if: github.event.schedule == '0 0 15 4 *'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python verify/verify_axis.py --axis 目先

      - name: Run 目先 monthly verification (毎月1日)
        if: github.event.schedule == '0 1 1 * *'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python verify/verify_axis.py --axis 目先 --only_past_due

      - name: Run 短期 verification (毎年3/18)
        if: github.event.schedule == '0 0 18 3 *'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python verify/verify_axis.py --axis 短期 --only_past_due
          echo "---"
          python verify/verify_axis.py --axis 中期 --only_past_due
          echo "---"
          python verify/verify_axis.py --axis 長期 --only_past_due

      - name: Run manual axis verification (手動実行・軸指定)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.axis != ''
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python verify/verify_axis.py --axis ${{ github.event.inputs.axis }}

      - name: Run both (手動実行・軸未指定時)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.axis == ''
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python verify/verify_monday.py
          echo "---"
          python verify/verify_axis.py --axis 目先
