name: Daily Price Update

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  daily-price-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth pandas numpy

      - name: 日次価格更新を実行
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python daily_price_update.py
