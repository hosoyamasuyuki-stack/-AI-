name: Daily Price Update

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  daily-price-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth pandas numpy yfinance scipy

      - name: 日次価格更新を実行
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          python daily_price_update.py

      - name: ダッシュボードHTML再生成
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== ダッシュボードHTML再生成 ==="
          python generate_dashboard.py
          echo "再生成完了"

      - name: GitHubにプッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Daily Update]"
          git add ai_dashboard_v13.html
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          MSG="dashboard update $(date +'%Y/%m/%d %H:%M') JST"
          git commit -m "$MSG"
          # 生成物は最新生成が常に正。旧 `git pull --rebase origin main || true`+`git push` は
          # 競合 rebase を握り潰し detached HEAD で push fatal(exit128)＝5日連続失敗の真因。
          # 最新 origin/main に生成物のみ載せ替え＋fast-forward リトライで根治（失敗は明示 exit1）。
          FILES="ai_dashboard_v13.html"
          SRC=$(git rev-parse HEAD)
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            PRESENT=""
            for fn in $FILES; do git cat-file -e "$SRC:$fn" 2>/dev/null && PRESENT="$PRESENT $fn"; done
            git checkout "$SRC" -- $PRESENT
            git add $PRESENT
            if git diff --staged --quiet; then echo "他更新で差分消滅（スキップ）"; exit 0; fi
            git commit -m "$MSG" --quiet
            SRC=$(git rev-parse HEAD)
            if git push origin HEAD:main; then echo "GitHubプッシュ完了"; exit 0; fi
            echo "push 競合・リトライ $i/5"
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::push failed after 5 retries"
          exit 1
