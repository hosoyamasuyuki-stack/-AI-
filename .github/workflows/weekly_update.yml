name: Weekly Investment Update

on:
  schedule:
    # X-2 場外化 2026-06-05: 月10:00JST（場中）→ 月07:00JST（寄付前）。
    # UTC日(0)22:00 +9h = 月07:00JST（JST月曜朝は UTC 日曜夜＝曜日0）。
    # スコアは前週引け値ベース（jquants EOD は月曜寄付前=金曜終値で同一）。
    - cron: '0 22 * * 0'  # 日22時UTC = 月曜7時JST（寄付前）
  workflow_dispatch:  # 手動実行ボタンも有効

env:
  TZ: Asia/Tokyo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance gspread google-auth requests pandas numpy

      - name: Run weekly update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python weekly_update.py
