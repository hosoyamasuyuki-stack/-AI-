name: Bulk Update Holdings

# 保有ポートフォリオ一括更新（v1.2 拡張：過去月投入対応）
# 起動経路:
#   - GAS（CEO のダッシュボード「一括更新」ボタン）から workflow_dispatch（通常運用・当月）
#   - GitHub Actions UI から手動 dispatch（過去月投入時・STEP 0 など）
on:
  workflow_dispatch:
    inputs:
      csv:
        description: 'CSV 本文（14 列日本語ヘッダ・改行区切り）'
        required: true
        type: string
      snapshot_month:
        description: 'snapshot_month を上書き（例: 2026-04-01・空欄なら実行時の当月）'
        required: false
        default: ''
        type: string
      snapshot_only:
        description: 'snapshot/diff/history のみ更新（master/extended 保護・過去月投入時は true）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: 'dry-run（true で Sheets 書き込みをスキップ・検証のみ）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  TZ: Asia/Tokyo

jobs:
  bulk-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: bulk-update-holdings
      cancel-in-progress: false

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth pandas numpy

      - name: 保有ポートフォリオ一括更新
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          HOLDINGS_CSV: ${{ github.event.inputs.csv }}
        run: |
          echo "=== 保有ポートフォリオ一括更新 ==="
          ARGS=""
          if [ -n "${{ github.event.inputs.snapshot_month }}" ]; then
            ARGS="$ARGS --snapshot-month=${{ github.event.inputs.snapshot_month }}"
            echo "snapshot_month: ${{ github.event.inputs.snapshot_month }}"
          fi
          if [ "${{ github.event.inputs.snapshot_only }}" = "true" ]; then
            ARGS="$ARGS --snapshot-only"
            echo "snapshot_only: true（master/extended 保護）"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
            echo "dry_run: true（Sheets 書き込みなし）"
          fi
          python bulk_update_holdings.py $ARGS

      - name: 完了通知
        if: always()
        run: |
          echo "=== 完了 ==="
          echo "結果: ${{ job.status }}"
          echo "対象: 保有ポートフォリオ_master / 保有スナップショット / 保有差分 / 保有差分_履歴"
