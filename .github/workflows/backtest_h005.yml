name: H005 MacroPhase Backtest

on:
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy yfinance scipy

      - name: Run H005 Backtest
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python backtest_H005_v1.py
          echo "---"
          python backtest_H005_v2.py
