name: Monthly Learning Batch

on:
  schedule:
    # X-2 場外化 2026-06-05: 1日12:00JST（昼休み）→ 1日16:00JST（大引け後）。
    # UTC1日07:00 +9h = 1日16:00JST（16:00は9時以降ゆえ日付ずれ無し＝月境界を跨がない）。
    - cron: '0 7 1 * *'
  workflow_dispatch:
    # 手動実行ボタン（テスト用）

env:
  TZ: Asia/Tokyo

jobs:
  learning-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install yfinance gspread google-auth pandas numpy scipy

      - name: 月次学習バッチを実行
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          python learning_batch_monthly.py

      # ============================================================
      # Step 4 (B-1-2 / 2026-05-07 追加):
      #   閾値補正提案を生成（読込のみ・既存閾値変更なし）
      # ・if: success() = 学習バッチ成功時のみ実行
      # ・continue-on-error: true = 提案生成失敗が学習バッチに影響しない独立化
      # ・参考: PROCEDURE_SELF_LEARNING_IMPROVEMENT_2026-05-07.md v2.0 §6 B-1-2
      # ============================================================
      - name: 閾値補正提案を生成（読込のみ・CEO レビュー用）
        if: success()
        continue-on-error: true
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          # 2026-06-06: verify/ 配下スクリプトは sys.path[0]=verify/ となり core を import 不能
          # → PYTHONPATH にリポジトリルートを通す（verify.yml と同方式・propose クラッシュ根治）
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 出力を保存し後段の死活監視で「静かな失敗」を surface（continue-on-error は維持）
          python verify/threshold_advisor.py 2>&1 | tee advisor.log || true

      - name: 閾値補正提案の死活監視（静かな失敗を surface・2026-06-06）
        if: always()
        run: |
          if ! grep -qE 'ADVISOR_MONITOR_SUMMARY ' advisor.log 2>/dev/null; then
            echo "::error::threshold_advisor: ADVISOR_MONITOR_SUMMARY 行が無い（import/接続でクラッシュした疑い）"
          elif grep -qE 'ADVISOR_MONITOR_SUMMARY ok=false' advisor.log; then
            echo "::warning::threshold_advisor: ok=false（提案生成は走ったが内部失敗）"
          else
            echo "閾値補正提案 死活監視 OK: $(grep -oE 'ADVISOR_MONITOR_SUMMARY ok=true candidates=[0-9]+ samples=[0-9]+' advisor.log | tail -1)"
          fi

      - name: スコア point-in-time スナップショット（読込のみ・追記・2026-06-06 自己学習の母）
        if: success()
        continue-on-error: true
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # verify/ 配下は sys.path[0]=verify/ で core を import 不能 → リポジトリルートを通す
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 既存スコアシートは読込のみ・スコア履歴_snapshot へ追記のみ（顧客 v4.3 不可触）
          python verify/snapshot_scores.py 2>&1 | tee snapshot.log || true

      - name: スコア履歴スナップショットの死活監視（静かな失敗を surface）
        if: always()
        run: |
          if ! grep -qE 'SNAPSHOT_MONITOR_SUMMARY ' snapshot.log 2>/dev/null; then
            echo "::error::snapshot_scores: SNAPSHOT_MONITOR_SUMMARY 行が無い（import/接続でクラッシュした疑い）"
          elif grep -qE 'SNAPSHOT_MONITOR_SUMMARY ok=false' snapshot.log; then
            echo "::warning::snapshot_scores: ok=false（スナップショットが内部失敗）"
          else
            echo "スコア履歴スナップショット 死活監視 OK: $(grep -oE 'SNAPSHOT_MONITOR_SUMMARY ok=true rows=[0-9]+ read=[0-9]+' snapshot.log | tail -1)"
          fi
