name: Full Update (All-in-One)

on:
  # ダッシュボードのボタンからGAS経由で起動
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  full-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: full-update
      cancel-in-progress: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth yfinance pandas numpy

      - name: Step 1 - 株価更新（yfinanceリアルタイム+v4.3シート反映）
        continue-on-error: true
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          PRICE_SOURCE: yfinance
        run: |
          echo "=== Step 1: 株価更新（yfinanceリアルタイム） ==="
          python daily_price_update.py
          echo "Step 1 完了"

      - name: Step 2 - マクロ指標更新（32指標+4層スコア）
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== Step 2: マクロ指標更新 ==="
          python daily_update.py
          echo "Step 2 完了"

      - name: API制限回避（60秒待機）
        run: |
          echo "Google Sheets APIレート制限回避のため60秒待機..."
          sleep 60
          echo "待機完了"

      - name: Step 3 - ダッシュボードHTML再生成
        continue-on-error: true
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== Step 3: ダッシュボード再生成 ==="
          python generate_dashboard.py
          echo "Step 3 完了"

      - name: Step 4 - GitHubにプッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Full Update]"
          git add -A
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          git commit -m "full update $(date +'%Y/%m/%d %H:%M') JST"
          git push
          echo "Step 4 GitHubプッシュ完了"
