name: Full Update (All-in-One)

on:
  # ダッシュボードのボタンからGAS経由で起動
  workflow_dispatch:

jobs:
  full-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests gspread google-auth yfinance pandas numpy

      - name: Step 1 - 株価更新（変数3再計算）
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          echo "=== Step 1: 日次価格更新 ==="
          python daily_price_update.py
          echo "✅ Step 1 完了"

      - name: Step 2 - マクロ指標更新（32指標+4層スコア）
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "=== Step 2: マクロ指標更新 ==="
          python daily_update.py
          echo "✅ Step 2 完了"

      - name: Step 3 - ダッシュボードHTML再生成
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "=== Step 3: ダッシュボード再生成 ==="
          python generate_dashboard.py
          echo "✅ Step 3 完了"

      - name: Step 4 - GitHubにプッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Full Update]"
          git add ai_dashboard_v13.html
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          git commit -m "🔄 全更新完了 $(TZ=Asia/Tokyo date +'%Y/%m/%d %H:%M') JST"
          git push
          echo "✅ Step 4 GitHubプッシュ完了 → GitHub Pagesに数分で反映"
