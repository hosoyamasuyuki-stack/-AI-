name: TDnet 決算短信取得

on:
  schedule:
    # 案 X'（2026-05-20 採用）: 週1 → 日1 拡張で 31 日窓の取りこぼし最小化
    # 毎日 02:30 UTC = 11:30 JST 実行（TDnet 31 日上限制約下で最大蓄積機会）
    - cron: '30 2 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml pdfplumber gspread google-auth

      - name: Run fetch_tanshin
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python tools/fetch_tanshin.py
