name: TDnet 決算短信取得

on:
  schedule:
    # 案 X'（2026-05-20 採用）: 週1 → 日1 拡張で 31 日窓の取りこぼし最小化
    # 毎日 02:30 UTC = 11:30 JST 実行（TDnet 31 日上限制約下で最大蓄積機会）
    - cron: '30 2 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Tokyo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml pdfplumber gspread google-auth supabase

      - name: Run fetch_tanshin
        id: fetch_tanshin_run
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # CEO 通達 2026-06-04: EDINET 補完取得用（TDnet 35 日制約の構造解決）
          # 未設定でもジョブは動作（::warning:: で skip 案内）。
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tools/fetch_tanshin.py 2>&1 | tee fetch_tanshin.log
          # C-6: 死活監視。全件エラー or 被覆率40%未満なら job を「失敗」させる。
          # 独立レビュー指摘: 旧実装は ::warning:: 止まりで job が緑のまま
          # ＝管理者に通知が届かず死活監視の体をなさなかった。::error:: +
          # 非ゼロ終了に昇格する。新規0件のみ（エラーなし）は閑散期の正常挙動。
          MONITOR_FAIL=0
          if grep -q "エラー" fetch_tanshin.log; then
            ERR=$(grep -oE 'エラー\s*: [0-9]+件' fetch_tanshin.log | grep -oE '[0-9]+' | head -1)
            NEW=$(grep -oE '新規/更新\s*: [0-9]+件' fetch_tanshin.log | grep -oE '[0-9]+' | head -1)
            ERR=${ERR:-0}
            NEW=${NEW:-0}
            echo "ERR=$ERR NEW=$NEW"
            # 致命的：処理対象があるのに全件エラー（NEW=0 かつ ERR>0）
            if [ "$ERR" -gt 0 ] && [ "$NEW" -eq 0 ]; then
              echo "::error::fetch_tanshin: 全件エラー（NEW=$NEW / ERR=$ERR）"
              MONITOR_FAIL=1
            fi
          fi
          # 被覆率40%未満（fetch_tanshin.py が ::warning:: を出力）も job 失敗に昇格
          if grep -qF '::warning::決算短信 被覆率' fetch_tanshin.log; then
            echo "::error::fetch_tanshin: 決算短信 被覆率が閾値(40%)未満"
            MONITOR_FAIL=1
          fi
          if [ "$MONITOR_FAIL" -ne 0 ]; then
            echo "fetch_tanshin 死活監視: 異常を検知したため job を失敗させます"
            exit 1
          fi
