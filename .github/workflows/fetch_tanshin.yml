name: TDnet 決算短信取得

on:
  schedule:
    # 案 X'（2026-05-20 採用）: 週1 → 日1 拡張で 31 日窓の取りこぼし最小化
    # 毎日 02:30 UTC = 11:30 JST 実行（TDnet 31 日上限制約下で最大蓄積機会）
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run（true で Sheet 書込なし・取得と判定のみ・System B 実データ検証用）'
        required: false
        default: 'false'

env:
  TZ: Asia/Tokyo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml pdfplumber gspread google-auth supabase

      - name: Run fetch_tanshin
        id: fetch_tanshin_run
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # CEO 通達 2026-06-04: EDINET 補完取得用（TDnet 35 日制約の構造解決）
          # 未設定でもジョブは動作（::warning:: で skip 案内）。
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          # System B (2026-06-09): workflow_dispatch の dry_run=true で Sheet 書込をスキップ（実データ検証用）。
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python tools/fetch_tanshin.py 2>&1 | tee fetch_tanshin.log
          # C-6 / H-1（2026-06-05 文字列ドリフト根絶）: 死活監視。
          # 旧実装は py 出力の日本語文字列（"エラー : N件" 等）を grep していたが、
          # EDINET 補完追加で出力が "エラー (TDnet) : N件" 等に変化し grep が空振り
          # → エラーが出ても job が緑のまま（run 26925050076 で実証）だった。
          # py が末尾に出力する機械可読 1 行 MONITOR_SUMMARY を parse する方式に変更。
          # 表示文言が今後変わっても監視は壊れない。
          SUMMARY=$(grep -oE 'MONITOR_SUMMARY new=[0-9]+ err=[0-9]+ coverage=[0-9.]+' fetch_tanshin.log | tail -1)
          if [ -z "$SUMMARY" ]; then
            echo "::error::fetch_tanshin: MONITOR_SUMMARY 行が無い（py が異常終了/クラッシュした疑い）"
            exit 1
          fi
          NEW=$(echo "$SUMMARY" | grep -oE 'new=[0-9]+' | grep -oE '[0-9]+')
          ERR=$(echo "$SUMMARY" | grep -oE 'err=[0-9]+' | grep -oE '[0-9]+')
          COV=$(echo "$SUMMARY" | grep -oE 'coverage=[0-9.]+' | grep -oE '[0-9.]+')
          echo "死活監視サマリ: NEW=$NEW ERR=$ERR COVERAGE=$COV%"
          MONITOR_FAIL=0
          # 主ゲート: 被覆率が閾値(40%)未満 = キャッシュ枯渇（chronic）。awk で float 比較。
          if awk "BEGIN{exit !($COV < 40)}"; then
            echo "::error::fetch_tanshin: 決算短信+EDINET 被覆率 ${COV}% が閾値(40%)未満"
            MONITOR_FAIL=1
          fi
          # 補助ゲート: 新規0件かつエラー>0 = 当日取得が全滅（acute）。
          # 被覆率は既存キャッシュが残るため当日全滅を検知できない → 本ゲートが必須。
          # （閑散期×一過性エラーで誤発火しうるが、死活監視は false-negative より
          #  false-positive を許容する方針。run 26925050076 は new=0/err=2 がまさにこれ）
          if [ "$ERR" -gt 0 ] && [ "$NEW" -eq 0 ]; then
            echo "::error::fetch_tanshin: 新規0件かつエラー${ERR}件（当日取得が全滅の疑い）"
            MONITOR_FAIL=1
          fi
          if [ "$MONITOR_FAIL" -ne 0 ]; then
            echo "fetch_tanshin 死活監視: 異常を検知しました"
            # System B (2026-06-09): dry-run は preview のため new=0（=新規取込なし＝キャッシュが最新）が正常。
            # ソフトゲート（被覆率 / 新規0&err>0）では dry-run の job を失敗させない。
            # クラッシュ検知（MONITOR_SUMMARY 行欠落の exit 1）は上で実施済＝dry-run でも有効。
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              echo "（dry-run のため job は失敗させない: new=0 等は preview では正常値）"
            else
              echo "job を失敗させます"
              exit 1
            fi
          fi

      - name: Stale tanshin monitor (X1-a)
        # X1-a（2026-06-05・協議資料 提案 X1-a 採用）: 決算短信キャッシュの stale 定期検知。
        # これまで stale 判定は完全 on-demand で定期検知が無く、顧客が古い短信で賢者を
        # 実行して初めて発覚するリスク（2026-06-03 クレームと同根）があった。日次で可視化する。
        # CEO 方針: 毎日ログのみ・通知は未実装・job は落とさない（fetch 失敗時も always で実行）。
        # stale_count>0 / GAS 到達不可 / ok=false は check_stale_tanshin.py が ::warning:: で surface。
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # job は落とさない（|| true）。stale/到達不可は script 側 ::warning:: が surface。
          python tools/check_stale_tanshin.py 2>&1 | tee stale_tanshin.log || true
          # H-1 同様のクラッシュ検知ガード: 機械可読行が無い＝script が異常終了した疑い。
          # （正常系・到達不可・JSON不正・ok=false の全経路で必ず STALE_MONITOR_SUMMARY を出力する設計）
          if ! grep -qE 'STALE_MONITOR_SUMMARY ' stale_tanshin.log; then
            echo "::warning::stale 監視: STALE_MONITOR_SUMMARY 行が無い（check_stale_tanshin.py がクラッシュした疑い）"
          fi
